dataset:
  name: synthetic_customer_orders_product
  description: Trusted synthetic customer orders dataset for analytics and model experimentation.
  domain: sales
  owner: data.owner@example.org
  steward: data.steward@example.org
  purpose: Provide a curated synthetic order model for reporting and experimentation.
  approved_use_cases:
    - Sales dashboard reporting
    - Feature prototyping
  not_approved_use_cases:
    - Production credit decisions
    - Customer outreach automation

source:
  system: synthetic_source_system
  table: synthetic_source.synthetic_orders_raw
  type: delta
  description: Synthetic raw order events generated for non-production testing.

target:
  lakehouse: synthetic_target
  schema: curated
  table: synthetic_orders_product
  write_mode: merge

refresh:
  frequency: daily
  mode: incremental
  watermark_column: event_timestamp
  partition_column: event_date

keys:
  business_keys:
    - order_id
    - order_item_id

policies:
  schema_drift:
    block_on_removed_column: true
    block_on_type_change: true
    warn_on_added_column: true
    require_approval_for_new_columns: true
  data_drift:
    enabled: true
    baseline: trailing_30_days
    block_on_critical_drift: false
    warn_on_distribution_drift: true
  incremental_safety:
    block_on_historical_partition_change: true
    closed_partition_grace_days: 7
    allow_late_arriving_records: true
    lookback_partitions: 2

quality_rules:
  - rule_id: qr_order_id_not_null
    rule_type: not_null
    severity: critical
    reason: Order ID must always be populated.
    column: order_id
  - rule_id: qr_amount_non_negative
    rule_type: min_value
    severity: warning
    reason: Synthetic order amounts should not be negative.
    column: order_amount
    threshold: 0

governance:
  dataset_classification: internal_synthetic
  columns:
    customer_email_hash:
      classification: confidential
      semantic_type: pseudonymous_identifier
      pii: true
      handling_rule: hash_only

contracts:
  upstream:
    expected_columns:
      - order_id
      - order_item_id
      - event_timestamp
      - order_amount
    expected_freshness: daily_by_08_00_utc
    breaking_changes:
      - Removed expected column
      - Changed type for key columns
  downstream:
    grain: order_item
    guaranteed_columns:
      - order_id
      - order_item_id
      - event_date
      - order_amount
    quality_expectations:
      - No null business keys
      - Non-negative order amounts

transformations:
  - step_id: step_filter_valid_orders
    name: filter_valid_orders
    description: Remove canceled synthetic test orders from curated output.
    reason: Ensure consumers only query analytically valid synthetic orders.
    input: synthetic_source.synthetic_orders_raw
    output: temp_valid_orders
    columns_used:
      - order_status
    columns_created: []
