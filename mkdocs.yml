site_name: Fabric Data Product Framework
repo_url: https://github.com/Voycepeh/fabric-data-product-framework
site_url: https://voycepeh.github.io/fabric-data-product-framework/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - MVP Workflow: mvp-workflow.md
  - Lifecycle Operating Model: lifecycle-operating-model.md
  - Architecture: architecture.md
  - Fabric Smoke Test: fabric-smoke-test.md
  - UV Wheel + Fabric Install Guide: UV_WHEEL_FABRIC_INSTALL_GUIDE.md
  - Recipes: recipes/index.md
  - Capability Status: capability-status.md
  - Function Reference: reference/SUMMARY.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: false
            separate_signature: true
            members_order: source
            show_root_heading: false
            show_root_toc_entry: false
            show_if_no_docstring: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
