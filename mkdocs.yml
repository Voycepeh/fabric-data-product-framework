site_name: Fabric Data Product Framework
repo_url: https://github.com/Voycepeh/fabric-data-product-framework
theme:
  name: mkdocs
nav:
  - Home: api/index.md
  - API:
      - Fabric Notebook: api/fabric_notebook.md
      - Template Generator: api/template_generator.md
      - Lineage: api/lineage.md
      - DQ Workflow: api/dq.md
      - Governance: api/governance.md
      - Data Contract: api/contracts.md
      - Drift Checkers: api/drift_checkers.md
      - MVP Steps: api/mvp_steps.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: true
