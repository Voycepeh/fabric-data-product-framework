site_name: FabricOps Starter Kit
repo_url: https://github.com/Voycepeh/FabricOps-Starter-Kit
site_url: https://voycepeh.github.io/FabricOps-Starter-Kit/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Lifecycle: lifecycle-operating-model.md
  - Notebook Model:
      - Overview: notebook-structure.md
      - 00_env_config: notebook-structure/00-env-config.md
      - 01_data_sharing_agreement: notebook-structure/01-data-sharing-agreement.md
      - 02_ex: notebook-structure/02-exploration.md
      - 03_pc: notebook-structure/03-pipeline-contract.md
  - AI Data Quality: data-quality-rules-system.md
  - Data Contract:
      - Overview: metadata-and-contracts.md
      - Contract Model: metadata-and-contracts/contract-model.md
      - Metadata Tables: metadata-and-contracts/metadata-tables.md
  - Deployment: deployment-and-promotion.md
  - Setup:
      - Create Wheel: setup/create-wheel.md
      - Run in Fabric: setup/run-in-fabric.md
  - Functions:
      - Function Reference: reference/index.md
      - Modules:
      # AUTO-GENERATED-MODULES-START
          - business_context: api/modules/business_context.md
          - environment_config: api/modules/environment_config.md
          - data_governance: api/modules/data_governance.md
          - data_lineage: api/modules/data_lineage.md
          - data_profiling: api/modules/data_profiling.md
          - data_quality: api/modules/data_quality.md
          - data_drift: api/modules/data_drift.md
          - fabric_input_output: api/modules/fabric_input_output.md
          - handover: api/modules/handover.md
          - data_product_metadata: api/modules/data_product_metadata.md
          - technical_columns: api/modules/technical_columns.md
      # AUTO-GENERATED-MODULES-END

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: false
            separate_signature: true
            members_order: source
            show_root_heading: false
            show_root_toc_entry: false
            show_if_no_docstring: true
            docstring_style: numpy
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/callable-finder.js

extra_css:
  - stylesheets/api-chips.css
