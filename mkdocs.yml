site_name: FabricOps Starter Kit
repo_url: https://github.com/Voycepeh/FabricOps-Starter-Kit
site_url: https://voycepeh.github.io/FabricOps-Starter-Kit/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Notebook Structure: notebook-structure.md
  - Lifecycle Operating Model: lifecycle-operating-model.md
  - Architecture: architecture.md
  - Setup:
      - Fabric Wheel Install: setup/fabric-wheel-install.md
  - Reference: reference/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: false
            separate_signature: true
            members_order: source
            show_root_heading: false
            show_root_toc_entry: false
            show_if_no_docstring: true
            docstring_style: numpy
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/api-chips.css
