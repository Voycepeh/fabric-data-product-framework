site_name: Fabric Data Product Framework
repo_url: https://github.com/Voycepeh/fabric-data-product-framework
site_url: https://voycepeh.github.io/fabric-data-product-framework/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - API:
      - API Overview: api/index.md
      - Public callable modules:
          - Fabric Notebook: api/fabric_notebook.md
          - Template Generator: api/template_generator.md
          - Lineage: api/lineage.md
          - DQ Workflow: api/dq.md
          - Governance: api/governance.md
          - Data Contract: api/contracts.md
          - Drift Checkers: api/drift_checkers.md
          - MVP Steps: api/mvp_steps.md
      - Additional module docs (internal / legacy):
          - Runtime: api/runtime.md
          - Profiling: api/profiling.md
          - Quality: api/quality.md
  - Reference: reference/SUMMARY.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: false
            separate_signature: true
            members_order: source
            show_root_heading: false
            show_root_toc_entry: false
            show_if_no_docstring: true
