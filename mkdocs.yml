site_name: FabricOps Starter Kit
repo_url: https://github.com/Voycepeh/FabricOps-Starter-Kit
site_url: https://voycepeh.github.io/FabricOps-Starter-Kit/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Lifecycle Operating Model: lifecycle-operating-model.md
  - Architecture:
      - Overview: architecture/index.md
      - Storage model: architecture/storage-model.md
      - Data quality architecture: architecture/data-quality-architecture.md
  - Notebook Structure: notebook-structure.md
  - Metadata and Contracts:
      - Overview: metadata-and-contracts.md
      - Contract model: metadata-and-contracts/contract-model.md
      - Metadata tables: metadata-and-contracts/metadata-tables.md
      - Notebook responsibilities: metadata-and-contracts/notebook-responsibilities.md
  - Deployment and Promotion: deployment-and-promotion.md
  - Functions:
      - Function Reference: reference/index.md
      - Modules:
          - ai: api/modules/ai.md
          - config: api/modules/config.md
          - contracts: api/modules/contracts.md
          - docs_metadata: api/modules/docs_metadata.md
          - drift: api/modules/drift.md
          - fabric_io: api/modules/fabric_io.md
          - governance: api/modules/governance.md
          - handover: api/modules/handover.md
          - lineage: api/modules/lineage.md
          - metadata: api/modules/metadata.md
          - profiling: api/modules/profiling.md
          - quality: api/modules/quality.md
          - run_summary: api/modules/run_summary.md
          - runtime: api/modules/runtime.md
          - technical_columns: api/modules/technical_columns.md
  - Setup:
      - Fabric Wheel Install: setup/fabric-wheel-install.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_signature_annotations: false
            separate_signature: true
            members_order: source
            show_root_heading: false
            show_root_toc_entry: false
            show_if_no_docstring: true
            docstring_style: numpy
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/api-chips.css
