dataset:
  name: example_actual_data_product
  description: Example actual-data MVP data product contract
  owner: data_team
  approved_usage: Replace with approved usage
  data_agreement_id: REPLACE_WITH_DATA_AGREEMENT_ID

runtime:
  environment: fabric_dev
  notebook_name: example_actual_data_mvp
  pipeline_name: example_actual_data_mvp
  source_system: fabric_lakehouse

source:
  type: table
  table: REPLACE_WITH_SOURCE_TABLE
  required_columns:
    - REPLACE_WITH_KEY_COLUMN
    - REPLACE_WITH_WATERMARK_COLUMN
  business_keys:
    - REPLACE_WITH_KEY_COLUMN
  watermark_column: REPLACE_WITH_WATERMARK_COLUMN
  partition_column: REPLACE_WITH_PARTITION_COLUMN

target:
  table: REPLACE_WITH_TARGET_TABLE
  mode: overwrite
  format: delta
  partition_column: REPLACE_WITH_PARTITION_COLUMN

quality:
  rules:
    - rule_id: key_not_null
      column: REPLACE_WITH_KEY_COLUMN
      rule_type: not_null
      severity: critical
      description: Business key must not be null
  generate_candidates: true
  use_rule_store: false
  rule_store_table: fw_metadata.dq_rules
  rule_status: approved
  fail_on: critical
  quarantine_enabled: true
  quarantine_table: fw_metadata.quarantine_summary

drift:
  schema_enabled: true
  data_enabled: true
  schema_policy:
    fail_on_missing_columns: true
    fail_on_type_changes: true
    allow_new_columns: false
  data_policy:
    partition_column: REPLACE_WITH_PARTITION_COLUMN
    business_keys:
      - REPLACE_WITH_KEY_COLUMN
    watermark_column: REPLACE_WITH_WATERMARK_COLUMN
    max_row_count_change_percent: 50
  baseline_schema_table: fw_metadata.schema_snapshots
  baseline_partition_table: fw_metadata.partition_snapshots

governance:
  classify_columns: true
  classification_table: fw_metadata.governance_classifications
  require_human_approval: true
  rules: []

metadata:
  schema: fw_metadata
  source_profile_table: fw_metadata.source_profile_records
  output_profile_table: fw_metadata.output_profile_records
  schema_snapshot_table: fw_metadata.schema_snapshots
  partition_snapshot_table: fw_metadata.partition_snapshots
  quality_result_table: fw_metadata.quality_results
  quarantine_table: fw_metadata.quarantine_summary
  contract_validation_table: fw_metadata.contract_validation_results
  lineage_table: fw_metadata.lineage_records
  run_summary_table: fw_metadata.run_summaries
  dataset_runs_table: fw_metadata.dataset_runs
  ai_context_table: fw_metadata.ai_context
