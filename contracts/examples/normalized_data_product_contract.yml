dataset:
  name: framework_mvp_orders
  description: Example Fabric data product contract
  owner: data_team
  approved_usage: MVP testing only

runtime:
  environment: fabric_test
  notebook_name: fabric_mvp_orders
  pipeline_name: fabric_mvp_orders

source:
  type: table
  table: fw_source.orders
  required_columns:
    - order_id
    - customer_id
    - amount
    - business_date
    - updated_at
  business_keys:
    - order_id
  watermark_column: updated_at
  partition_column: business_date

target:
  table: fw_curated.orders
  mode: overwrite
  format: delta
  required_columns:
    - order_id
    - customer_id
    - amount
    - business_date
    - updated_at

quality:
  rules:
    - rule_id: order_id_not_null
      column: order_id
      rule_type: not_null
      severity: critical
      description: order_id must not be null
  generate_candidates: false
  use_rule_store: false
  rule_store_table: fw_metadata.dq_rules
  rule_status: approved
  fail_on: critical
  quarantine_enabled: true
  quarantine_table: fw_metadata.quarantine_summary

drift:
  schema_enabled: true
  data_enabled: true
  schema_policy:
    block_on_removed_column: true
    block_on_type_change: true
    warn_on_added_column: true
    require_approval_for_new_columns: true
  data_policy:
    partition_column: business_date
    business_keys:
      - order_id
    watermark_column: updated_at
    block_on_historical_partition_change: true
    closed_partition_grace_days: 1
    allow_historical_changes: false
    require_approval_for_historical_changes: true
    run_mode: incremental
  baseline_schema_table: fw_metadata.schema_snapshots
  baseline_partition_table: fw_metadata.partition_snapshots

governance:
  classify_columns: true
  classification_table: fw_metadata.governance_classifications
  require_human_approval: true
  rules:
    - rule_id: staff_id_identifier
      classification: identifier
      action: restrict_access
      patterns:
        - staff_id
        - employee_id
      confidence: 0.95
      reason: Staff identifiers require restricted access

metadata:
  schema: fw_metadata
  source_profile_table: fw_metadata.source_profile_records
  output_profile_table: fw_metadata.output_profile_records
  schema_snapshot_table: fw_metadata.schema_snapshots
  partition_snapshot_table: fw_metadata.partition_snapshots
  quality_result_table: fw_metadata.quality_results
  quarantine_table: fw_metadata.quarantine_summary
  contract_validation_table: fw_metadata.contract_validation_results
  lineage_table: fw_metadata.lineage_records
  run_summary_table: fw_metadata.run_summaries
  dataset_runs_table: fw_metadata.dataset_runs
