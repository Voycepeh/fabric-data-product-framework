<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <style>
    body{margin:0;font:14px system-ui;background:#0b1020;color:#d7deff}
    #app{display:flex;min-height:100vh}
    .title{font-size:16px;font-weight:700;margin-bottom:8px}
    #left{flex:1 1 auto;min-width:0;padding:12px}
    #graphWrap{position:relative;overflow:hidden;border:1px solid #25304a;border-radius:8px;background:#0f1730}
    #right{width:32%;min-width:280px;max-width:420px;border-left:1px solid #25304a;padding:12px;overflow:auto}
    input,select,button{background:#121a31;color:#d7deff;border:1px solid #2f3a58;border-radius:6px;padding:6px}
    button{cursor:pointer}
    .search-wrap{display:flex;flex-direction:column;gap:6px;min-width:220px;position:relative}
    #matchPicker{display:none;position:absolute;top:36px;left:0;right:0;max-height:180px;overflow:auto;background:#10182e;border:1px solid #334061;border-radius:8px;z-index:20}
    .match-item{display:block;width:100%;text-align:left;padding:8px;border:none;border-bottom:1px solid #25304a;background:transparent;color:#d7deff;cursor:pointer}
    .match-item:last-child{border-bottom:none}
    .match-item:hover{background:#1a2647}
    svg{width:100%;height:var(--graph-height,62vh);touch-action:none}
    .node{cursor:pointer}
    .edge{stroke:#5a6a95;stroke-opacity:.24}
    .edge.hl{stroke:#ffd166;stroke-opacity:.95;stroke-width:2.2}
    .muted{opacity:.14}
    .legend span{display:inline-block;margin-right:8px}
    .pill{display:inline-block;padding:2px 7px;border-radius:999px;border:1px solid #2f3a58;background:#121a31;margin-right:5px}
    .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#b9c4e8;font-weight:600}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:flex-start}
    .layout-toggle{display:inline-flex;border:1px solid #2f3a58;border-radius:6px;overflow:hidden}
    .layout-toggle button{border:none;border-right:1px solid #2f3a58;border-radius:0;background:#121a31;padding:6px 10px}
    .layout-toggle button:last-child{border-right:none}
    .layout-toggle button.active{background:#24355f;color:#ffffff}
    .layout-toggle button.deemphasized{opacity:.72}
    .search-hint{font-size:12px;color:#aebae3;margin:0}
    #mobileOverviewHint{display:none;font-size:12px;color:#ffd166;margin:0}
    body.embed-mode #app{min-height:0}
    body.embed-mode .title,
    body.embed-mode .controls,
    body.embed-mode .legend{display:none}
    body.embed-mode #left{padding:8px}
    body.embed-mode #graphWrap{border-color:#2f3a58}
    body.embed-mode #right{width:320px;min-width:220px;padding:8px;border-left-color:#2f3a58}
    body.embed-mode #right h3{margin:0 0 8px;font-size:14px}
    body.embed-mode #ins{font-size:12px;line-height:1.35}
    body.embed-mode svg{height:var(--graph-height,320px)}
    body.embed-mode .pill{margin-bottom:4px}
    body.embed-mode .empty{font-size:13px}
    body.embed-mode.compact-inspector #right{display:none}
    body.embed-mode.compact-inspector #left{padding:6px}
    @media(max-width:900px){
      #app{flex-direction:column}
      #right{width:auto;min-width:0;border-left:none;border-top:1px solid #25304a}
      svg{height:var(--graph-height,56vh)}
      .search-wrap{min-width:100%}
    }
    @media(min-width:1200px){
      #left{padding:14px 16px}
      #right{width:24%;max-width:360px}
      svg{height:var(--graph-height,58vh)}
    }
  </style>
</head>
<body>
  <div id='app'>
    <section id='left'>
      <div class='title'>Callable Dependency Explorer</div>
      <div class='controls'>
        <div class='search-wrap'>
          <input id='q' placeholder='Find callable to focus'>
          <div id='matchPicker'></div>
          <p class='search-hint'>Search focuses a callable neighborhood; module/role filters control graph scope.</p>
        </div>
        <select id='m'><option value=''>All modules</option></select>
        <select id='r'><option value=''>All roles</option></select>
        <div id='layoutToggle' class='layout-toggle' role='group' aria-label='Graph layout mode'>
          <button id='layoutOverview' type='button' data-layout='overview'>Overview</button>
          <button id='layoutFocus' type='button' data-layout='focus'>Focus</button>
        </div>
        <p id='mobileOverviewHint'>Overview map is best viewed on a larger screen.</p>
        <button id='reset'>Reset view</button>
      </div>
      <div id='graphWrap'><svg id='g'></svg><div id='empty' class='empty' style='display:none'>No callables match the current filters.</div></div>
      <div class='legend'><span>● public</span><span>● internal helper</span><span>● internal callable</span></div>
    </section>
    <aside id='right'><h3>Callable Inspector</h3><div id='ins'>Select a node.</div></aside>
  </div>
<script>
const color=n=>n.exported?'#66d9ef':(n.is_underscore?'#ff6b6b':'#c792ea');
fetch('../reference/callable-map.json').then(r=>r.json()).then(data=>{
const params=new URLSearchParams(window.location.search);
const embedMode=params.get('embed')==='1';
if(embedMode) document.body.classList.add('embed-mode');
const qEl=document.getElementById('q'),mEl=document.getElementById('m'),rEl=document.getElementById('r'),ins=document.getElementById('ins');
const layoutToggle=document.getElementById('layoutToggle');
const layoutOverviewBtn=document.getElementById('layoutOverview');
const layoutFocusBtn=document.getElementById('layoutFocus');
const mobileOverviewHint=document.getElementById('mobileOverviewHint');
const picker=document.getElementById('matchPicker');
const svg=document.getElementById('g'),empty=document.getElementById('empty'),resetBtn=document.getElementById('reset');
const nodes=data.nodes, edges=data.edges.filter(e=>e.callee_qualified_name), byQ=Object.fromEntries(nodes.map(n=>[n.qualified_name,n]));
[...new Set(nodes.map(n=>n.module_name))].sort().forEach(m=>mEl.innerHTML+=`<option>${m}</option>`);
[...new Set(nodes.map(n=>n.role))].sort().forEach(r=>rEl.innerHTML+=`<option>${r}</option>`);
let sel=null, visNodes=[], visEdges=[], pos={}, camera={x:0,y:0,w:100,h:100};
let pinchDist=0;
const PADDING={full:26,filtered:18,focused:10,embed:8};
const HEIGHT_LIMITS=embedMode?{min:220,max:520,row:34,pad:80}:{min:260,max:820,row:34,pad:120};
const urlFocus=params.get('focus');
const isMobileStandalone=()=>!embedMode&&window.matchMedia('(max-width: 900px)').matches;
let layoutMode=embedMode?'focus':((urlFocus||isMobileStandalone())?'focus':'overview');
if(embedMode&&layoutToggle) layoutToggle.style.display='none';

function setLayoutMode(mode){
  layoutMode=mode==='focus'?'focus':'overview';
  layoutOverviewBtn.classList.toggle('active',layoutMode==='overview');
  layoutFocusBtn.classList.toggle('active',layoutMode==='focus');
  const mobile=isMobileStandalone();
  layoutOverviewBtn.classList.toggle('deemphasized',mobile);
  if(mobileOverviewHint) mobileOverviewHint.style.display=(mobile&&layoutMode==='overview')?'block':'none';
}
setLayoutMode(layoutMode);

const layout=()=>{
  const focusLayout=layoutMode==='focus'&&!embedMode&&sel;
  if(focusLayout){
    const rels=directRelationships(sel);
    const upstream=rels.up.filter(q=>byQ[q]).map(q=>byQ[q]).sort((a,b)=>a.callable_name.localeCompare(b.callable_name));
    const downstream=rels.down.filter(q=>byQ[q]).map(q=>byQ[q]).sort((a,b)=>a.callable_name.localeCompare(b.callable_name));
    pos={};
    const rowH=44;
    const centerX=120;
    const neighborX=410;
    pos[sel]={x:centerX,y:0};
    const placeColumn=(arr,startY)=>{for(let i=0;i<arr.length;i++)pos[arr[i].qualified_name]={x:neighborX,y:startY+i*rowH};};
    placeColumn(upstream,-Math.max(0,(upstream.length-1)*rowH));
    placeColumn(downstream,Math.max(rowH,(downstream.length?rowH:0)));
    return;
  }
  const groups=new Map();for(const n of visNodes){if(!groups.has(n.module_name))groups.set(n.module_name,[]);groups.get(n.module_name).push(n)}const modules=[...groups.keys()].sort();const rowH=34,colGap=120;let x=0;pos={};for(const m of modules){const arr=groups.get(m).sort((a,b)=>a.callable_name.localeCompare(b.callable_name));const h=Math.max(100,arr.length*rowH+44);for(let i=0;i<arr.length;i++)pos[arr[i].qualified_name]={x:x+70,y:i*rowH+42-h/2};x+=Math.max(200,Math.min(320,140+arr.length*7))+colGap}if(modules.length===1){for(const k in pos)pos[k].x-=x/2}
};
const bounds=(keys)=>{const pts=keys.map(k=>pos[k]).filter(Boolean);if(!pts.length)return null;let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;for(const p of pts){minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x+140);minY=Math.min(minY,p.y-18);maxY=Math.max(maxY,p.y+18)}return{minX,minY,maxX,maxY}};

function inScopeNodes(){const mf=mEl.value,rf=rEl.value;return nodes.filter(n=>(!mf||n.module_name===mf)&&(!rf||n.role===rf));}
function inScopeEdges(set){return edges.filter(e=>set.has(e.caller_qualified_name)&&set.has(e.callee_qualified_name));}
function searchMatches(scopeNodes,q){const t=q.trim().toLowerCase();if(!t)return[];return scopeNodes.filter(n=>n.callable_name.toLowerCase().includes(t)||n.qualified_name.toLowerCase().includes(t)).sort((a,b)=>a.callable_name.localeCompare(b.callable_name));}
function isDirectHelper(a,b){return a.module_name===b.module_name&&(a.is_underscore||b.is_underscore);} 
function neighborhoodKeys(selected,set,scopeEdges){
  if(!selected||!set.has(selected)) return new Set([...set]);
  const out=new Set([selected]);
  const selectedNode=byQ[selected];
  for(const e of scopeEdges){
    if(e.caller_qualified_name===selected){
      const n=byQ[e.callee_qualified_name]; if(!n) continue;
      if(isDirectHelper(selectedNode,n)||selectedNode.module_name!==n.module_name) out.add(n.qualified_name);
    }
    if(e.callee_qualified_name===selected){
      const n=byQ[e.caller_qualified_name]; if(!n) continue;
      if(isDirectHelper(selectedNode,n)||selectedNode.module_name!==n.module_name) out.add(n.qualified_name);
    }
  }
  return out;
}
function showPicker(matches){
  if(!matches.length){picker.style.display='none';picker.innerHTML='';return;}
  picker.innerHTML=matches.slice(0,12).map(n=>`<button class='match-item' data-q='${n.qualified_name}'>${n.callable_name} <span style='opacity:.75'>(${n.module_name})</span></button>`).join('');
  picker.style.display='block';
  picker.querySelectorAll('.match-item').forEach(b=>b.onclick=()=>{picker.style.display='none';select(b.dataset.q,true);});
}
const modePadding=(targetKeys)=>{if(embedMode) return PADDING.embed;if(sel&&targetKeys&&targetKeys.length) return PADDING.focused;const hasFilters=Boolean(mEl.value||rEl.value);return hasFilters?PADDING.filtered:PADDING.full;};
const setGraphHeight=(targetKeys)=>{const b=bounds(targetKeys||visNodes.map(n=>n.qualified_name));if(!b){svg.style.setProperty('--graph-height',`${HEIGHT_LIMITS.min}px`);return;}const nodeCount=(targetKeys&&targetKeys.length)||visNodes.length||1;const content=Math.max(b.maxY-b.minY+HEIGHT_LIMITS.pad,nodeCount*HEIGHT_LIMITS.row+HEIGHT_LIMITS.pad);const h=Math.max(HEIGHT_LIMITS.min,Math.min(HEIGHT_LIMITS.max,Math.round(content)));svg.style.setProperty('--graph-height',`${h}px`);if(embedMode){const compact=nodeCount<=2||h<=260;document.body.classList.toggle('compact-inspector',compact);}};
const fit=(targetKeys)=>{const keys=targetKeys||visNodes.map(n=>n.qualified_name);const b=bounds(keys);if(!b){camera={x:-50,y:-50,w:100,h:100};svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`);setGraphHeight();return;}const pad=modePadding(keys);const w=Math.max(220,b.maxX-b.minX+pad*2),h=Math.max(140,b.maxY-b.minY+pad*2);camera={x:b.minX-pad,y:b.minY-pad,w,h};svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`);setGraphHeight(keys)};

function directRelationships(qn){
  const up=[...new Set(visEdges.filter(e=>e.callee_qualified_name===qn).map(e=>e.caller_qualified_name))].sort();
  const down=[...new Set(visEdges.filter(e=>e.caller_qualified_name===qn).map(e=>e.callee_qualified_name))].sort();
  return {up,down};
}
function renderInspector(qn){
  if(!qn||!byQ[qn]){ins.textContent='Select a node.';return;}
  const n=byQ[qn],rels=directRelationships(qn);const ctype=n.exported?'public callable':(n.is_underscore?'private helper':'internal callable');
  ins.innerHTML=`<div class='pill'>module: ${n.module_name}</div><div class='pill'>role: ${n.role}</div><div class='pill'>type: ${ctype}</div><h4 style='margin:10px 0 4px'>${n.callable_name}</h4><p style='margin:0 0 8px;color:#aebae3'>Focused callable</p><b>Direct upstream callers</b><br>${rels.up.map(v=>v.split('.').slice(-2).join('.')).join('<br>')||'—'}<br><br><b>Direct downstream calls</b><br>${rels.down.map(v=>v.split('.').slice(-2).join('.')).join('<br>')||'—'}`;
}
function render(){
  const scoped=inScopeNodes();
  const set=new Set(scoped.map(n=>n.qualified_name));
  const scopedEdges=inScopeEdges(set);
  if(sel&&!set.has(sel)) sel=null;

  const q=qEl.value.trim();
  const matches=searchMatches(scoped,q);
  if(q){
    const exact=matches.find(n=>n.callable_name.toLowerCase()===q.toLowerCase()||n.qualified_name.toLowerCase()===q.toLowerCase());
    if(exact){sel=exact.qualified_name;picker.style.display='none';}
    else showPicker(matches);
  } else picker.style.display='none';

  const keepKeys=(layoutMode==='focus')?neighborhoodKeys(sel,set,scopedEdges):new Set([...set]);
  visNodes=scoped.filter(n=>keepKeys.has(n.qualified_name));
  const vset=new Set(visNodes.map(n=>n.qualified_name));
  visEdges=scopedEdges.filter(e=>vset.has(e.caller_qualified_name)&&vset.has(e.callee_qualified_name));

  svg.innerHTML='';
  empty.style.display=visNodes.length?'none':'flex';
  if(!visNodes.length){ins.textContent='No callables match the current filters.';return;}
  layout();

  for(const e of visEdges){const a=pos[e.caller_qualified_name],b=pos[e.callee_qualified_name];if(!a||!b)continue;const highlight=sel&&(e.caller_qualified_name===sel||e.callee_qualified_name===sel);svg.insertAdjacentHTML('beforeend',`<line class='edge ${highlight?'hl':''}' x1='${a.x}' y1='${a.y}' x2='${b.x}' y2='${b.y}'/>`);} 
  const labelSize=(layoutMode==='focus'&&!embedMode)?14:12;
  for(const n of visNodes){const p=pos[n.qualified_name];const muted=sel&&n.qualified_name!==sel&&!visEdges.some(e=>(e.caller_qualified_name===sel&&e.callee_qualified_name===n.qualified_name)||(e.callee_qualified_name===sel&&e.caller_qualified_name===n.qualified_name));const stroke=n.qualified_name===sel?'#ffd166':'#1b2542';svg.insertAdjacentHTML('beforeend',`<g class='node ${muted?'muted':''}' data-q='${n.qualified_name}'><circle cx='${p.x}' cy='${p.y}' r='8' fill='${color(n)}' stroke='${stroke}' stroke-width='2'/><text x='${p.x+12}' y='${p.y+4}' fill='#d7deff' font-size='${labelSize}'>${n.callable_name}</text></g>`);} 
  svg.querySelectorAll('.node').forEach(el=>el.onclick=()=>select(el.dataset.q,true));
  if(sel&&pos[sel]) fit([sel,...new Set(visEdges.flatMap(e=>e.caller_qualified_name===sel?[e.callee_qualified_name]:e.callee_qualified_name===sel?[e.caller_qualified_name]:[]))]); else fit();
  renderInspector(sel);
}
function select(qn,setInput=false){sel=qn;if(setInput&&byQ[qn]&&!embedMode) qEl.value=byQ[qn].callable_name;render();}
[qEl,mEl,rEl].forEach(x=>x.oninput=render);resetBtn.onclick=()=>{sel=null;qEl.value='';picker.style.display='none';render()};
layoutOverviewBtn.onclick=()=>{setLayoutMode('overview');render();};
layoutFocusBtn.onclick=()=>{setLayoutMode('focus');render();};
window.matchMedia('(max-width: 900px)').addEventListener('change',()=>{setLayoutMode(layoutMode);render();});
document.addEventListener('click',e=>{if(!picker.contains(e.target)&&e.target!==qEl)picker.style.display='none';});

svg.addEventListener('wheel',e=>{if(!visNodes.length)return;e.preventDefault();const f=e.deltaY<0?0.9:1.1;camera.w*=f;camera.h*=f;svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`)},{passive:false});
let dragging=false,sx=0,sy=0;svg.addEventListener('pointerdown',e=>{dragging=true;sx=e.clientX;sy=e.clientY;svg.setPointerCapture(e.pointerId)});svg.addEventListener('pointermove',e=>{if(!dragging)return;const dx=(e.clientX-sx)*(camera.w/svg.clientWidth),dy=(e.clientY-sy)*(camera.h/svg.clientHeight);camera.x-=dx;camera.y-=dy;sx=e.clientX;sy=e.clientY;svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`)});svg.addEventListener('pointerup',()=>dragging=false);
svg.addEventListener('touchstart',e=>{if(e.touches.length===2){const[a,b]=e.touches;pinchDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}},{passive:true});svg.addEventListener('touchmove',e=>{if(e.touches.length!==2||!pinchDist)return;const[a,b]=e.touches;const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);const f=pinchDist/d;camera.w*=f;camera.h*=f;pinchDist=d;svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`)},{passive:true});
if(urlFocus){
  const normalized=urlFocus.toLowerCase();
  const hit=nodes.find(n=>n.callable_name.toLowerCase()===normalized||n.qualified_name.toLowerCase().endsWith(`.${normalized}`)||n.qualified_name.toLowerCase()===normalized);
  if(hit){sel=hit.qualified_name;if(!embedMode) qEl.value=hit.callable_name;}
}
render();
});
</script>
</body>
</html>
