<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <style>
    .title { font: 700 48px sans-serif; fill: #1f2a44; }
    .label { font: 500 30px sans-serif; fill: #1f2a44; }
    .center { font: 700 40px sans-serif; fill: #243b8a; }
    .box { fill: #f8faff; stroke: #6b84e8; stroke-width: 3; }
    .centerbox { fill: #eef3ff; stroke: #4967d6; stroke-width: 4; }
    .arrow { stroke: #6b84e8; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b84e8" />
    </marker>
  </defs>
  <text x="60" y="70" class="title">FabricOps data contract assembly</text>

  <rect x="510" y="330" width="380" height="160" rx="24" class="centerbox"/>
  <text x="700" y="420" text-anchor="middle" class="center">Data contract</text>

  <rect x="40" y="140" width="360" height="140" rx="20" class="box"/>
  <text x="220" y="198" text-anchor="middle" class="label">00_env_config</text>
  <text x="220" y="238" text-anchor="middle" class="label">runtime config</text>

  <rect x="520" y="110" width="360" height="140" rx="20" class="box"/>
  <text x="700" y="168" text-anchor="middle" class="label">Agreement and</text>
  <text x="700" y="208" text-anchor="middle" class="label">approved usage</text>

  <rect x="1000" y="140" width="360" height="140" rx="20" class="box"/>
  <text x="1180" y="198" text-anchor="middle" class="label">02_ex notebook</text>
  <text x="1180" y="238" text-anchor="middle" class="label">profiling + draft</text>

  <rect x="40" y="560" width="360" height="140" rx="20" class="box"/>
  <text x="220" y="618" text-anchor="middle" class="label">03_pc notebook</text>
  <text x="220" y="658" text-anchor="middle" class="label">enforcement + evidence</text>

  <rect x="1000" y="560" width="360" height="140" rx="20" class="box"/>
  <text x="1180" y="618" text-anchor="middle" class="label">FabricOps callable</text>
  <text x="1180" y="658" text-anchor="middle" class="label">functions</text>

  <line x1="400" y1="210" x2="560" y2="360" class="arrow"/>
  <line x1="700" y1="250" x2="700" y2="330" class="arrow"/>
  <line x1="1000" y1="210" x2="840" y2="360" class="arrow"/>
  <line x1="400" y1="630" x2="560" y2="460" class="arrow"/>
  <line x1="1000" y1="630" x2="840" y2="460" class="arrow"/>
</svg>
